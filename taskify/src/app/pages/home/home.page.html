<div>

<!-- HEADER -->
<div
    class="flex items-center justify-between mb-8"
  >

    <div>

      <h1 class="text-3xl font-bold text-slate-800">
        Mis tareas
      </h1>

      <p class="text-slate-500 mt-2">
        Organiza tu productividad 
      </p>

    </div>

    <!-- NEW TASK BUTTON -->
    <button
      *ngIf="showCreateButton"
      (click)="openModal()"
      class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-3 rounded-2xl shadow-md hover:shadow-lg transition-all duration-200 flex items-center gap-2"
    >

      <span class="text-xl">
        +
      </span>

      <span>
        Nueva tarea
      </span>

    </button>

</div>

<!-- MODAL BACKDROP -->
<div
  *ngIf="showModal"
  (click)="closeModal()"
  class="fixed inset-0 bg-black/40 backdrop-blur-sm flex items-center justify-center z-50 p-4"
>

  <!-- MODAL -->
  <div
    (click)="$event.stopPropagation()"
    class="bg-white w-full max-w-lg rounded-3xl shadow-2xl p-8 animate-fade-in"
  >

    <!-- TOP -->
    <div
      class="flex items-center justify-between mb-6"
    >

      <div>

        <h2 class="text-2xl font-bold text-slate-800">

          {{ editingId ? 'Editar tarea' : 'Nueva tarea' }}

        </h2>

        <p class="text-slate-500 mt-1">

          Completa la información

        </p>

      </div>

      <!-- CLOSE -->
      <button
        (click)="closeModal()"
        class="w-10 h-10 rounded-full hover:bg-slate-100 flex items-center justify-center transition-all"
      >

        ✕

      </button>

    </div>

    <!-- FORM -->
    <div class="flex flex-col gap-5">

      <!-- TITLE -->
      <input
        [(ngModel)]="taskTitle"
        type="text"
        placeholder="Nombre de la tarea"
        class="border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-400"
      />

      <!-- CATEGORY -->
      <select
        [(ngModel)]="selectedCategory"
        class="border border-slate-200 rounded-2xl p-4 outline-none focus:ring-2 focus:ring-blue-400"
      >

        <option value="">
          Selecciona una categoría
        </option>

        <option
          *ngFor="let category of categories"
          [value]="category.id"
        >

          {{ category.name }}

        </option>

      </select>

      <!-- SAVE -->
      <button
        [disabled]="!taskTitle.trim() || !selectedCategory"
        (click)="editingId ? saveEdit() : createTask()"
        class="h-14 rounded-2xl text-white font-semibold transition-all duration-200"
        [class.bg-blue-500]="taskTitle.trim() && selectedCategory"
        [class.hover:bg-blue-600]="taskTitle.trim() && selectedCategory"
        [class.bg-slate-300]="!taskTitle.trim() || !selectedCategory"
      >

        {{ editingId ? 'Guardar' : 'Agregar' }}

      </button>

    </div>

  </div>

</div>
  <!-- FILTERS -->
  <div
    class="bg-white rounded-2xl shadow-md p-6 mb-8"
  >

    <div class="grid md:grid-cols-2 gap-4">

      <input
        [(ngModel)]="search"
        (input)="filterTasks()"
        type="text"
        placeholder="Buscar tarea..."
        class="border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-400"
      />

      <select
        [(ngModel)]="filterCategory"
        (change)="filterTasks()"
        class="border border-slate-200 rounded-xl p-3 outline-none focus:ring-2 focus:ring-blue-400"
      >

        <option value="">
          Todas las categorías
        </option>

        <option
          *ngFor="let category of categories"
          [value]="category.id"
        >
          {{ category.name }}
        </option>

      </select>

    </div>

  </div>

  <!-- TASKS -->
<!-- TASKS -->
<div class="grid gap-4">

  <div
    *ngFor="let task of filteredTasks"
    class="bg-white rounded-3xl shadow-md p-5 flex items-center justify-between hover:shadow-lg transition-all duration-200"
  >

    <!-- LEFT -->
    <div class="flex items-center gap-4 flex-1 ">
    <button
      (click)="toggleTask(task.id)"
      class="w-7 h-7 rounded-full flex items-center justify-center font-semibold transition-all duration-200"
      style="border: 1px solid black;"
      [ngClass]="task.completed ? 'bg-blue-500 border-2 border-blue-500' : 'bg-white border-2 border-black'"
    >
      <ion-icon
        *ngIf="task.completed"
        name="checkmark-outline"
        class="text-white text-sm"
      ></ion-icon>
    </button>

      <!-- TASK INFO -->
      <div class="flex flex-col md:flex-row md:items-center gap-3">

        <!-- TITLE -->
        <h2
          class="text-lg font-semibold text-slate-800 transition-all duration-200"
          [class.line-through]="task.completed"
          [class.text-slate-400]="task.completed"
        >

          {{ task.title }}

        </h2>

        <!-- CATEGORY BADGE -->
        <div
          class="bg-blue-100 text-blue-700 px-4 py-1 rounded-full text-sm font-medium w-fit"
        >

          {{ getCategoryName(task.categoryId) }}

        </div>

      </div>

    </div>

    <!-- ACTIONS -->
    <div class="flex items-center gap-3">

      <!-- EDIT -->
      <button
        (click)="startEdit(task)"
        class="w-11 h-11 rounded-full bg-white shadow-md flex items-center justify-center hover:bg-blue-50 hover:scale-110 hover:shadow-lg transition-all duration-200"
      >

        <ion-icon
          name="create-outline"
          class="text-black text-lg"
        ></ion-icon>

      </button>

      <!-- DELETE -->
      <button
        (click)="deleteTask(task.id)"
        class="w-11 h-11 rounded-full bg-white shadow-md flex items-center justify-center hover:bg-red-50 hover:scale-110 hover:shadow-lg transition-all duration-200"
      >

        <ion-icon
          name="trash-outline"
          class="text-black text-lg"
        ></ion-icon>

      </button>

    </div>

  </div>

</div>
</div>
